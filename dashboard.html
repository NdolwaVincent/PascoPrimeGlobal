<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Deposit Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Axios -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

</head>
<body class="bg-gray-100">

<div class="max-w-lg mx-auto mt-10 bg-white p-6 rounded-2xl shadow-lg">

  <h2 class="text-2xl font-bold mb-4 text-center">💰 Make Deposit</h2>

  <!-- Phone -->
  <input id="phone" type="text" placeholder="Enter Phone (07XXXXXXXX)"
    class="w-full p-3 border rounded-lg mb-3" />

  <!-- Amount -->
  <input id="amount" type="number" placeholder="Enter Amount"
    class="w-full p-3 border rounded-lg mb-3" />

  <!-- Button -->
  <button id="proceedBtn"
    class="w-full bg-green-600 text-white p-3 rounded-lg font-semibold hover:bg-green-700">
    Proceed Payment
  </button>

  <!-- Status -->
  <p id="status" class="mt-4 text-center text-sm text-gray-700"></p>

</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
   apiKey: "AIzaSyD6k4OlLYnotuuChAjLBoHmqfv9-iwrlfY",
      authDomain: "alfajiri-database.firebaseapp.com",
      databaseURL: "https://alfajiri-database-default-rtdb.firebaseio.com",
      projectId: "alfajiri-database",
      storageBucket: "alfajiri-database.appspot.com",
      messagingSenderId: "310417854615",
      appId: "1:310417854615:web:6f65002a119caeaf9119d2",
      measurementId: "G-21TBZCRBHM"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// UI Elements
const phoneInput = document.getElementById("phone");
const amountInput = document.getElementById("amount");
const proceedBtn = document.getElementById("proceedBtn");
const statusText = document.getElementById("status");

// Simulated logged user
const username = "user_" + Math.floor(Math.random() * 1000);

let pollInterval;

// 🔥 PAYMENT BUTTON
proceedBtn.addEventListener("click", async () => {

  const phone = phoneInput.value.trim();
  const amount = parseFloat(amountInput.value);

  if(!phone.match(/^0\d{8,9}$/)){
    alert("Enter valid phone number");
    return;
  }

  if(!amount || amount <= 0){
    alert("Enter valid amount");
    return;
  }

  statusText.textContent = "⏳ Sending STK Push...";

  try {
    const formData = new FormData();
    formData.append("action", "pay");
    formData.append("phone", phone);
    formData.append("amount", amount);

    const res = await axios.post("payment.php", formData);
    const data = res.data;

    if(data.status === "success"){
      statusText.textContent = "📲 Check your phone to complete payment";
      startPolling(data.ref, phone, amount);
    } else {
      statusText.textContent = "❌ " + data.message;
    }

  } catch (err) {
    statusText.textContent = "❌ Request failed";
  }

});

// 🔥 POLLING FUNCTION
function startPolling(refCode, phone, amount){
  if(pollInterval) clearInterval(pollInterval);

  pollInterval = setInterval(async () => {
    try {
      const res = await axios.get(`check_status.php?ref=${refCode}`);
      const status = res.data.status;

      if(!status) return;

      statusText.textContent = "Status: " + status;

      if(status === "Success"){
        clearInterval(pollInterval);

        // SAVE TO FIREBASE
        push(ref(db, "Deposits"), {
          username,
          phone,
          amount,
          reference: refCode,
          date: new Date().toISOString()
        });

        statusText.textContent = "✅ Payment Successful!";
        phoneInput.value = "";
        amountInput.value = "";
      }

      if(status === "Failed"){
        clearInterval(pollInterval);
        statusText.textContent = "❌ Payment Failed";
      }

    } catch (err) {
      console.log(err);
    }
  }, 3000);
}

</script>

</body>
</html>
